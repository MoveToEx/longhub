version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/query.sql"
    schema: "sql/schema.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        json_tags_case_style: "camel"
        emit_empty_slices: true
        overrides:
          - column: "user.preference"
            go_type:
              import: "long/internal/types"
              type: "Preference"
          - column: "webauthn_session.data"
            go_type:
              import: "github.com/go-webauthn/webauthn/webauthn"
              type: "SessionData"
